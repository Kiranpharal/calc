<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="./src/output.css" rel="stylesheet">
</head>
<body class=" bg-slate-400 flex justify-center items-center min-h-screen">
    
    <div class=" grid grid-cols-4 bg-gray-900 gap-2 p-6 w-80 h-120 rounded-3xl shadow-2xl border-gray-700 ">

        <div class="col-span-4"> <input type="text" id="display" readonly class="w-full h-20 mb-5 bg-gray-500 rounded-2xl text-right text-3xl text-white px-4" >
       </div>
        <button class="bg-red-500 hover:bg-red-400 text-white text-2xl rounded-xl h-14 shadow-lg">AC</button>
        <button class="bg-yellow-500 hover:bg-yellow-400 text-white text-2xl rounded-xl h-14 shadow-lg">C</button>
        <button class="bg-orange-500 hover:bg-orange-400 text-white text-2xl rounded-xl h-14 shadow-lg">%</button>
        <button class="bg-orange-500 hover:bg-orange-400 text-white text-2xl rounded-xl h-14 shadow-lg">/</button>

        <button class="h-14 rounded-xl shadow-lg bg-gray-300">7</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">8</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">9</button>
        <button class="bg-orange-500 hover:bg-orange-400 text-white text-2xl rounded-xl h-14 shadow-lg">*</button>

        <button class="h-14 rounded-xl shadow-lg bg-gray-300">4</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">5</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">6</button>
        <button class="bg-orange-500 hover:bg-orange-400 text-white text-2xl rounded-xl h-14 shadow-lg">-</button>

        <button class="h-14 rounded-xl shadow-lg bg-gray-300">1</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">2</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">3</button>
        <button class="bg-orange-500 hover:bg-orange-400 text-white text-2xl rounded-xl h-14 shadow-lg">+</button>

        <button class="h-14 rounded-xl shadow-lg bg-gray-300">00</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">0</button>
        <button class="h-14 rounded-xl shadow-lg bg-gray-300">.</button>
        <button class="bg-green-500 hover:bg-green-400 text-white text-2xl rounded-xl h-14 shadow-lg">=</button>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
