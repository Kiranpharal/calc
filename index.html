<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="./src/output.css" rel="stylesheet">
</head>
<body class=" bg-olive-200 flex justify-center items-center min-h-screen">
    
    <div class=" grid grid-cols-4 bg-gray-900 gap-2 p-4 w-80 h-120 rounded-xl shadow-lg">

        <div class="col-span-4">
        <input type="text" id="display" readonly class="w-full h-20 bg-white rounded-lg text-right text-3xl px-4" >
       </div>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">AC</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">C</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">%</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">/</button>

        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">7</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">8</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">9</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">*</button>

        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">4</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">5</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">6</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">-</button>

        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">1</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">2</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">3</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">+</button>

        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">00</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">0</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">.</button>
        <button class="flex items-center justify-center h-14 rounded shadow-lg bg-gray-300">=</button>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
